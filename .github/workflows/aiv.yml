name: AIV Gate
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  aiv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Speed up git diff
        run: |
          git config diff.renames false
          git config diff.renameLimit 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Test and package AIV CLI (full reactor for aiv-cli + JaCoCo)
        run: mvn -B -ntp clean verify -pl aiv-cli -am

      - name: Run AIV
        id: aiv
        run: |
          cd aiv-cli/target
          EXITCODE=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            java -Daiv.git.timeout.seconds=600 -jar aiv-cli-1.0.0-SNAPSHOT.jar --workspace ${{ github.workspace }} --diff origin/${{ github.base_ref }} 2>&1 | tee ../../aiv-report.txt
            EXITCODE=${PIPESTATUS[0]}
          else
            BASE="${{ github.event.before }}"
            if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              echo "Initial push, skipping AIV"
              EXITCODE=0
            else
              java -Daiv.git.timeout.seconds=600 -jar aiv-cli-1.0.0-SNAPSHOT.jar --workspace ${{ github.workspace }} --diff $BASE --head HEAD 2>&1 | tee ../../aiv-report.txt
              EXITCODE=${PIPESTATUS[0]}
            fi
          fi
          echo "exitcode=$EXITCODE" >> $GITHUB_OUTPUT
          exit $EXITCODE
        continue-on-error: true

      - name: Post AIV report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'aiv-report.txt');
            let raw = fs.existsSync(reportPath) ? fs.readFileSync(reportPath, 'utf8') : 'Report not available.';

            const overallMatch = raw.match(/Overall:\s*(PASS|FAIL)/i);
            const overall = overallMatch ? overallMatch[1].toUpperCase() : 'UNKNOWN';
            const isPass = overall === 'PASS';

            const violations = [];
            const failRe = /^\s*(\w+):\s*FAIL\s*-\s*(.+)$/gm;
            let m;
            while ((m = failRe.exec(raw)) !== null) {
              violations.push({ gate: m[1], msg: m[2].trim() });
            }

            let body = `## AIV Report\n\n`;
            body += `**Status:** ${isPass ? 'PASS' : 'FAIL'}\n\n`;
            if (violations.length > 0) {
              body += `**Violations:**\n`;
              violations.forEach(v => { body += `- **${v.gate}:** ${v.msg}\n`; });
              body += `\n`;
            }
            body += `<details><summary>Full report</summary>\n\n\`\`\`\n${raw}\n\`\`\`\n</details>`;

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const aivComment = comments.find(c => c.user.type === 'Bot' && c.body.startsWith('## AIV Report'));

            if (aivComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: aivComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

      - name: Fail if AIV failed
        run: |
          if [ "${{ steps.aiv.outputs.exitcode }}" = "0" ]; then
            exit 0
          fi
          if [ -f aiv-report.txt ] && grep -q "timed out" aiv-report.txt; then
            echo "::warning::AIV skipped: git diff timed out. CI passes to avoid blocking."
            exit 0
          fi
          echo "::error::AIV gates failed."
          exit 1
