# Builds the reactor, runs tests, and attaches aiv-cli JAR to a GitHub Release for the pushed tag.
# Usage: git tag v1.0.0 && git push origin v1.0.0
#
# Release asset URL pattern (for workflows using cli-jar-url):
#   https://github.com/vaquarkhan/aiv-integrity-gate/releases/download/v1.0.0/aiv-cli-1.0.0.jar
#
name: Release (GitHub)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Version from tag
        id: ver
        shell: bash
        run: |
          REF="${{ github.ref }}"
          echo "version=${REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Align Maven versions
        shell: bash
        run: mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.16.2:set "-DnewVersion=${{ steps.ver.outputs.version }}" -DgenerateBackupPoms=false

      - name: Build and test
        shell: bash
        run: mvn -B -ntp clean verify

      - name: Create GitHub Release and upload CLI JAR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          JAR="aiv-cli/target/aiv-cli-${VERSION}.jar"
          test -f "$JAR"
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes \
            "$JAR"
