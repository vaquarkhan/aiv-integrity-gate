# Assignment Gate: Proof of Work over Permission to Work
#
# Runs when AIV Gate completes successfully. Assigns the PR author to issues
# linked in the PR (Fixes #123, Closes #123). Prevents "Issue Squatting" where
# contributors get assigned before submitting code, then ghost or submit low-quality work.
#
# Add this workflow to your repo alongside aiv.yml. Requires no extra secrets.
#
# Author: Vaquar Khan

name: Assignment Gate

on:
  workflow_run:
    workflows: ["AIV Gate"]
    types: [completed]
    branches: [main, master]

jobs:
  assign-on-aiv-pass:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Assign PR author to linked issues
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const run = context.payload.workflow_run;
            const headBranch = run.head_branch;
            const repo = context.repo;
            const headOwner = run.head_repository?.owner?.login || repo.owner;
            const head = `${headOwner}:${headBranch}`;

            const { data: pulls } = await github.rest.pulls.list({
              ...repo,
              state: 'open',
              head: head,
            });

            if (pulls.length === 0) return;

            const pr = pulls[0];
            const body = pr.body || '';
            const author = pr.user.login;

            const issueRegex = /(?:fixes?|closes?|resolves?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(issueRegex)];
            const issueNumbers = [...new Set(matches.map(m => parseInt(m[1], 10)))];

            if (issueNumbers.length === 0) return;

            for (const num of issueNumbers) {
              try {
                await github.rest.issues.addAssignees({
                  ...repo,
                  issue_number: num,
                  assignees: [author],
                });
                console.log('Assigned @' + author + ' to #' + num);
              } catch (err) {
                console.warn('Could not assign to #' + num + ': ' + err.message);
              }
            }
