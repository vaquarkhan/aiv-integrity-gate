# Sample AIV Design Rules for Apache Spark
#
# NOTE: Full sample (config + design-rules) is at docs/samples/apache-spark/
# Copy design-rules.yaml from there. This file is kept for reference.
#
# Based on Spark contributing guide, SPIP process, and configuration docs.
# Jira: https://issues.apache.org/jira/projects/SPARK
# Contributing: https://spark.apache.org/contributing.html
#
# Copy to your Spark fork: .aiv/design-rules.yaml
#
# Author: Vaquar Khan

constraints:
  # --- Configuration: Use SparkConf, not system properties ---
  # Spark config must go through SparkConf. System.getProperty bypasses
  # spark-submit, spark-defaults.conf, and cluster manager config.
  # Ref: docs/configuration.md
  - id: config-use-sparkconf
    keywords: [SparkConf, spark.conf, getConf, conf.get]
    forbidden_calls:
      - System.getProperty
      - System.setProperty
    required_calls: []

  # --- Deprecated: DStream / StreamingContext ---
  # DStream-based streaming is deprecated since 3.4.0.
  # Use Structured Streaming instead.
  # Ref: migration guide, deprecated-list
  - id: no-dstream
    keywords: [StreamingContext, DStream, streaming]
    forbidden_calls:
      - new StreamingContext
      - new JavaStreamingContext
      - DStream
    required_calls: []

  # --- Deprecated: HiveContext ---
  # HiveContext deprecated since 2.0.0.
  # Use SparkSession.builder.enableHiveSupport()
  - id: no-hivecontext
    keywords: [HiveContext, hive]
    forbidden_calls:
      - new HiveContext
      - HiveContext
    required_calls: []

  # --- Deprecated: UserDefinedAggregateFunction ---
  # Use Aggregator via functions.udaf() instead.
  - id: no-udaf-legacy
    keywords: [UserDefinedAggregateFunction, UDAF]
    forbidden_calls:
      - UserDefinedAggregateFunction
    required_calls: []

  # --- Java serialization ---
  # Spark prefers Kryo. Avoid java.io.Serializable for new code.
  # Ref: Spark serialization docs
  - id: no-java-serialization
    keywords: [Serializable, ObjectOutputStream]
    forbidden_calls:
      - implements Serializable
      - java.io.ObjectOutputStream
      - ObjectInputStream
    required_calls: []

  # --- Blacklist terminology ---
  # Scheduler listeners using "blacklist" replaced with "exclude" since 3.1.0.
  - id: no-blacklist-terminology
    keywords: [blacklist, blackList]
    forbidden_calls:
      - blacklist
      - blackList
    required_calls: []

  # --- Config in new code: spark. prefix ---
  # New Spark config keys must use spark. prefix and go through SparkConf.
  - id: config-spark-prefix
    keywords: [spark., setMaster, setAppName]
    forbidden_calls:
      - Runtime.getRuntime
    required_calls: []

  # --- Avoid System.out in production code ---
  # Use logging. Ref: error message guidelines
  - id: no-system-out
    keywords: []
    forbidden_calls:
      - System.out.println
      - System.err.println
    required_calls: []
