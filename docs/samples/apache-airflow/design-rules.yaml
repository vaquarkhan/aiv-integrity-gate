# Sample AIV Design Rules for Apache Airflow
#
# Airflow is a Python project. Rules apply to .py files.
# Repo: https://github.com/apache/airflow
# Contributing: https://github.com/apache/airflow/blob/main/CONTRIBUTING.rst
#
# Copy to your Airflow fork: .aiv/design-rules.yaml
#
# Author: Vaquar Khan

constraints:
  # --- Deprecated: days_ago ---
  # airflow.utils.dates.days_ago deprecated. Use datetime.timedelta or pendulum.
  - id: no-days-ago
    keywords: [days_ago, airflow.utils.dates]
    forbidden_calls:
      - days_ago
      - airflow.utils.dates.days_ago
    required_calls: []

  # --- Security: No eval/exec in DAG files ---
  # eval and exec are dangerous in DAG code.
  - id: no-eval-exec
    keywords: [DAG, dag]
    forbidden_calls:
      - eval(
      - exec(
    required_calls: []

  # --- No System.exit in Python ---
  - id: no-sys-exit
    keywords: []
    forbidden_calls:
      - sys.exit
    required_calls: []

  # --- Providers: Use airflow.providers ---
  # Import from airflow.providers.* for provider code.
  - id: use-providers
    keywords: [airflow.operators, airflow.sensors]
    forbidden_calls:
      - airflow.contrib
    required_calls: []
