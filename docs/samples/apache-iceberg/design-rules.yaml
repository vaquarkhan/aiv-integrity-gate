# AIV Design Rules for Apache Iceberg
#
# REJECT: emoji in code, attribution markers, logic that doesn't match standards,
# and code that doesn't match Iceberg architecture.
#
# Repo: https://github.com/apache/iceberg
# Docs: https://iceberg.apache.org/contribute/
# Maintenance: https://iceberg.apache.org/docs/latest/maintenance/
#
# Copy to your Iceberg fork: .aiv/design-rules.yaml
#
# Author: Vaquar Khan

constraints:
  # =============================================================================
  # EMOJI IN CODE (reject - not Apache/Iceberg style)
  # =============================================================================
  # Code sometimes contains emoji in comments. Apache projects use plain text.
  - id: no-emoji-in-code
    keywords: []
    forbidden_calls:
      - "✅"
      - "❌"
      - "🔒"
      - "📝"
      - "⚠️"
      - "🎯"
      - "✨"
      - "🚀"
      - "💡"
      - "📌"
      - "🔧"
      - "🐛"
      - "👍"
      - "📋"
      - "🎉"
      - "🔄"
      - "📦"
      - "📊"
      - "🏗️"
      - "🔍"
      - "🛠️"
      - "⚡"
      - "🌟"
      - "📈"
      - "📉"
      - "🚨"
      - "💯"
      - "🔑"
      - "📄"
    required_calls: []

  # =============================================================================
  # ATTRIBUTION MARKERS (reject - do not commit tool attribution)
  # =============================================================================
  - id: no-ai-generated-markers
    keywords: []
    forbidden_calls:
      - "Generated by AI"
      - "AI-generated"
      - "AI generated"
      - "Generated by ChatGPT"
      - "Generated by Copilot"
      - "Generated by Claude"
      - "Generated by Gemini"
      - "Auto-generated by"
      - "// AI "
      - "/* AI "
      - "TODO: AI"
    required_calls: []

  # =============================================================================
  # NON-STANDARD COMMENTS (reject)
  # =============================================================================
  - id: no-ai-boilerplate-comments
    keywords: []
    forbidden_calls:
      - "As an AI"
      - "I'll help you"
      - "I'm an AI"
  # =============================================================================
  # SHADOW LOGIC: Snapshot expiration
  # =============================================================================
  # Code that "looks right" but modifies in-memory lists instead of metadata is wrong.
  # Snapshot expiration MUST use ExpireSnapshots API to rewrite manifest lists and
  # clean data files. Direct manipulation does nothing.
  # Ref: https://iceberg.apache.org/docs/latest/maintenance/
  - id: snapshot-expiration-must-use-api
    keywords: [expireSnapshots, ExpireSnapshots, snapshot expiration, expire snapshot]
    forbidden_calls:
      - table.removeSnapshots
      - removeSnapshots
      - .remove(snapshot)
      - snapshots().remove
      - toRemove.add
      - MetadataUpdate.RemoveSnapshot
    required_calls: [expireSnapshots]

  # ExpireSnapshots requires .commit() - contributors sometimes forget to commit
  - id: expire-snapshots-must-commit
    keywords: [expireSnapshots, ExpireSnapshots]
    forbidden_calls: []
    required_calls: [.commit]

  # =============================================================================
  # DEPRECATED APIs
  # =============================================================================
  # MetadataUpdate.RemoveSnapshot deprecated in 1.9, removed in 1.10. Use RemoveSnapshots.
  - id: no-deprecated-remove-snapshot
    keywords: [MetadataUpdate, RemoveSnapshot]
    forbidden_calls:
      - MetadataUpdate.RemoveSnapshot
      - RemoveSnapshot
    required_calls: []

  # FileRewriter deprecated - use FileRewritePlanner + FileRewriteRunner
  - id: no-deprecated-file-rewriter
    keywords: [rewrite, Rewrite]
    forbidden_calls:
      - FileRewriter
      - SizeBasedFileRewriter
      - BinPackRewriteFilePlanner
    required_calls: []

  # SystemProperties deprecated - use SystemConfigs
  - id: no-deprecated-system-properties
    keywords: [SystemProperties, system config]
    forbidden_calls:
      - SystemProperties
    required_calls: []

  # =============================================================================
  # SCHEMA EVOLUTION
  # =============================================================================
  # Schema changes MUST go through table.updateSchema(). Direct schema mutation
  # bypasses metadata and breaks evolution guarantees.
  - id: schema-must-use-update-schema
    keywords: [addColumn, dropColumn, renameColumn, schema evolution]
    forbidden_calls:
      - schema.add
      - schema.remove
      - schema.rename
      - schema.set
    required_calls: []

  # =============================================================================
  # TRANSACTION PATTERN
  # =============================================================================
  - id: transaction-must-commit
    keywords: [newTransaction, commitTransaction]
    forbidden_calls: []
    required_calls: [commitTransaction]

  # =============================================================================
  # TESTS: Avoid Thread.sleep (causes flaky tests)
  # =============================================================================
  # Use Awaitility for async assertions. Ref: Iceberg CONTRIBUTING.md
  - id: no-thread-sleep-in-tests
    keywords: [Test, @Test, Awaitility, await]
    forbidden_calls:
      - Thread.sleep
    required_calls: []

  # =============================================================================
  # TESTS: Prefer assertThatThrownBy over try/catch + Assert.fail
  # =============================================================================
  # CONTRIBUTING.md: Use assertThatThrownBy for exception assertions.
  - id: no-assert-fail-in-tests
    keywords: [Test, @Test]
    forbidden_calls:
      - "Assert.fail("
    required_calls: []

  # =============================================================================
  # LOGGING & PRODUCTION CODE
  # =============================================================================
  - id: no-system-exit
    keywords: []
    forbidden_calls:
      - System.exit
    required_calls: []

  - id: no-system-out
    keywords: []
    forbidden_calls:
      - System.out.println
      - System.err.println
    required_calls: []

  # =============================================================================
  # DEPRECATION ANNOTATIONS (must have javadoc)
  # =============================================================================
  # CONTRIBUTING.md: @Deprecated must include @deprecated javadoc with version.
  - id: deprecation-requires-javadoc
    keywords: [@Deprecated]
    forbidden_calls: []
    required_calls: ["@deprecated"]

  # =============================================================================
  # ARCHITECTURE: PendingUpdate must call commit
  # =============================================================================
  # All Table operations return PendingUpdate; must call .commit() to apply.
  - id: pending-update-must-commit
    keywords: [updateSchema, updateProperties, updateSpec, newAppend, newOverwrite, newDelete, newRewrite, replaceSortOrder, removeOrphanFiles]
    forbidden_calls: []
    required_calls: [.commit]

  # =============================================================================
  # ARCHITECTURE: Schema evolution - addColumn must use Types API
  # =============================================================================
  # Iceberg requires Types.LongType.get(), Types.StringType.get(), etc. for schema.
  - id: add-column-must-use-types
    keywords: [addColumn]
    forbidden_calls: []
    required_calls: [Types.]

  # =============================================================================
  # ARCHITECTURE: Scan filters must use Expressions API
  # =============================================================================
  # Iceberg Scan.filter() takes Expression, not raw strings. Use Expressions.equal(),
  # Expressions.and(), etc. filter("col = 5") is wrong.
  - id: filter-must-use-expressions
    keywords: [.filter(]
    forbidden_calls: []
    required_calls: [Expressions.]

  # =============================================================================
  # ARCHITECTURE: Partition spec is immutable - use updateSpec()
  # =============================================================================
  # Partition evolution must use table.updateSpec().addField().removeField().commit().
  # Direct mutation of partitionSpec() does nothing.
  - id: no-direct-partition-spec-mutation
    keywords: [partitionSpec]
    forbidden_calls:
      - partitionSpec().addField
      - partitionSpec().removeField
      - partitionSpec().add
      - partitionSpec().remove
    required_calls: []

  # =============================================================================
  # ARCHITECTURE: Sort order is immutable - use replaceSortOrder()
  # =============================================================================
  # Sort order evolution must use table.replaceSortOrder().asc().dec().commit().
  # Direct mutation of sortOrder() does nothing.
  - id: no-direct-sort-order-mutation
    keywords: [sortOrder]
    forbidden_calls:
      - sortOrder().asc(
      - sortOrder().desc(
      - sortOrder().ascNullsFirst
      - sortOrder().ascNullsLast
    required_calls: []

  # =============================================================================
  # STANDARDS: Apache license header required (all new files)
  # =============================================================================
  - id: apache-license-header
    keywords: []
    forbidden_calls: []
    required_calls: ["Licensed to the Apache Software Foundation"]

  # =============================================================================
  # STANDARDS: No java.io.Serializable (prefer Kryo/avro for Iceberg)
  # =============================================================================
  - id: no-java-serialization
    keywords: [Serializable]
    forbidden_calls:
      - "implements Serializable"
      - "extends Serializable"
    required_calls: []
