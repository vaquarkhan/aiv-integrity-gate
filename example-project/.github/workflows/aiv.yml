name: AIV Gate
on:
  pull_request:
    branches: [main, master]

jobs:
  aiv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: 17

      - name: Download AIV CLI (Maven Central)
        run: |
          curl -fsSL -o aiv-cli.jar \
            "https://repo1.maven.org/maven2/io/github/vaquarkhan/aiv/aiv-cli/1.0.4/aiv-cli-1.0.4.jar"

      - name: Run AIV
        id: aiv
        run: |
          set -o pipefail
          java -jar aiv-cli.jar \
            --workspace "${{ github.workspace }}" \
            --diff "origin/${{ github.base_ref }}" \
            --output-json aiv-report.json 2>&1 | tee aiv-report.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post AIV report to PR
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'aiv-report.txt');
            let raw = fs.existsSync(reportPath) ? fs.readFileSync(reportPath, 'utf8') : 'Report not available.';

            const overallMatch = raw.match(/Overall:\s*(PASS|FAIL)/i);
            const overall = overallMatch ? overallMatch[1].toUpperCase() : 'UNKNOWN';
            const isPass = overall === 'PASS';

            const violations = [];
            const failRe = /^\s*(\w+):\s*FAIL\s*-\s*(.+)$/gm;
            let m;
            while ((m = failRe.exec(raw)) !== null) {
              violations.push({ gate: m[1], msg: m[2].trim() });
            }

            let body = `## AIV Report\n\n`;
            body += `**Status:** ${isPass ? 'PASS' : 'FAIL'}\n\n`;
            if (violations.length > 0) {
              body += `**Violations:**\n`;
              violations.forEach(v => { body += `- **${v.gate}:** ${v.msg}\n`; });
              body += `\n`;
            }
            body += `<details><summary>Full report</summary>\n\n\`\`\`\n${raw}\n\`\`\`\n</details>`;

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const aivComment = comments.find(c => c.user.type === 'Bot' && c.body.startsWith('## AIV Report'));

            if (aivComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: aivComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body
              });
            }

      - name: Fail if AIV failed
        run: |
          if [ "${{ steps.aiv.outputs.exitcode }}" != "0" ]; then
            exit 1
          fi
