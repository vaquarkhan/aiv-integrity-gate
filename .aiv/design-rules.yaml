# Design constraints - forbidden and required patterns
# Note: System.exit is allowed in CLI main() - not forbidden for this project
# AI slop detection: emoji and attribution markers are common tells of AI-generated code
constraints:
  # AI slop: emoji in code (common tell)
  - id: no-emoji-in-code
    keywords: []
    forbidden_calls:
      - "\u2705"
      - "\u274C"
      - "\U0001F512"
      - "\u26A0\uFE0F"
      - "\u2728"
      - "\U0001F680"
      - "\U0001F4A1"
      - "\U0001F44D"
      - "\U0001F389"
      - "\U0001F504"
      - "\u26A1"
      - "\U0001F4AF"
    required_calls: []
