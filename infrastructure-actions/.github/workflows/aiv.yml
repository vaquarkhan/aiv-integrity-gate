# Reusable workflow - projects call this for 3-line opt-in
# Usage in project's .github/workflows/ci.yml:
#
#   jobs:
#     aiv:
#       uses: apache/infrastructure-actions/.github/workflows/aiv.yml@main
#
# Author: Vaquar Khan
name: AIV Gate

on:
  workflow_call:
    inputs:
      base-ref:
        description: 'Base ref for diff (e.g. origin/main)'
        required: false
        type: string

jobs:
  aiv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./aiv
        with:
          base-ref: ${{ inputs.base-ref || format('origin/{0}', github.base_ref) || 'origin/main' }}
