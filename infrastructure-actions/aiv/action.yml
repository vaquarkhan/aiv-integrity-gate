# AIV (Automated Integrity Validation) - Apache Infrastructure Action
# Projects opt-in by adding 3 lines to .github/workflows
#
# Author: Vaquar Khan
name: 'AIV Gate'
description: 'Run Automated Integrity Validation on PR diffs'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  base-ref:
    description: 'Base ref for diff (e.g. origin/main). Caller passes origin/${{ github.base_ref }}'
    required: true
  workspace:
    description: 'Workspace path'
    required: false
    default: '${{ github.workspace }}'

runs:
  using: 'composite'
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download AIV CLI
      run: |
        AIV_VERSION="1.0.0"
        AIV_URL="https://repo.maven.apache.org/maven2/org/apache/aiv/aiv-cli/${AIV_VERSION}/aiv-cli-${AIV_VERSION}.jar"
        curl -sL -o aiv-cli.jar "$AIV_URL" || \
        curl -sL -o aiv-cli.jar "https://github.com/apache/aiv-gate/releases/download/v${AIV_VERSION}/aiv-cli-${AIV_VERSION}.jar" || \
        { echo "::error::AIV CLI not found. Publish aiv-cli to Maven Central or GitHub Releases."; exit 1; }
      shell: bash

    - name: Run AIV Gate
      run: |
        java -jar aiv-cli.jar --workspace "${{ inputs.workspace }}" --diff "${{ inputs.base-ref }}"
      shell: bash
